server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security Headers - Comprehensive Defensive Security
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), microphone=(self), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://maps.googleapis.com https://unpkg.com https://maps.gstatic.com https://www.gstatic.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://maps.gstatic.com https://maps.googleapis.com https://www.google-analytics.com; connect-src 'self' https://generativelanguage.googleapis.com https://maps.googleapis.com https://*.firebaseio.com https://firebase.googleapis.com https://translation.googleapis.com https://www.google-analytics.com https://region1.google-analytics.com; worker-src 'self'; frame-ancestors 'none';" always;

    # Cache static assets for performance
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1d;
        add_header Cache-Control "public, no-transform";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Block common attack vectors
    location ~ /\. {
        deny all;
    }

    # Disable server tokens
    server_tokens off;
}
